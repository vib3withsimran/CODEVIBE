[build]
  base = "."
  command = "rm -f client/pnpm-lock.yaml client/pnpm-workspace.yaml && npm install --no-package-lock && npm run build --workspace=client"
  publish = "client/dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"