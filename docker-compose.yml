services:
  mongo:
    image: mongo:6-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_URL: mongodb://mongo:27017/codevibe
    depends_on:
      - mongo
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules

  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - server
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules

volumes:
  mongo-data:
  server_node_modules:
  client_node_modules: